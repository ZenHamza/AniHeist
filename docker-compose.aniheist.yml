version: "3.8"
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: anime-scraper-api:latest
    container_name: anime-scraper-api
    expose:
      - "8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=INFO
      - MAX_BROWSERS=3
      - JSON_LOGGING=true
      - RATE_LIMIT_PER_MINUTE=30
      - TOTAL_REQUEST_TIMEOUT=90.0
      - PER_SOURCE_TIMEOUT=45.0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen(http://localhost:8000/api/health)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - scraper-net
  redis:
    image: redis:7-alpine
    container_name: anime-scraper-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    networks:
      - scraper-net
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: aniheist-frontend:latest
    container_name: aniheist-frontend
    expose:
      - "3000"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    networks:
      - scraper-net
  nginx:
    image: nginx:alpine
    container_name: anime-scraper-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - api
      - frontend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    networks:
      - scraper-net
volumes:
  redis_data:
networks:
  scraper-net:
    driver: bridge
